[pytest]
testpaths = tests
addopts = -v --tb=short -m "not openssl"
markers =
    unit: Pure unit tests, no DB or HTTP (fast, always run)
    integration: Full HTTP stack with real subprocess cert creation
    ui: HTML response assertions using BeautifulSoup
    openssl: Tests that inspect PEM/CRL with the cryptography library
    e2e: Future browser-level Playwright tests (skipped by default)
