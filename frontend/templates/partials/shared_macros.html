{% macro breadcrumb(items) -%}
<nav class="text-sm breadcrumbs mb-4">
    <ul>
        {% for item in items %}
            {% if item.href %}
            <li><a href="{{ item.href }}">{{ item.label }}</a></li>
            {% else %}
            <li>{{ item.label }}</li>
            {% endif %}
        {% endfor %}
    </ul>
</nav>
{%- endmacro %}

{% macro alert(kind, title, message) -%}
<div role="alert" class="alert alert-{{ kind }} mb-4">
    <div>
        <h3 class="font-semibold">{{ title }}</h3>
        <div class="text-sm">{{ message }}</div>
    </div>
</div>
{%- endmacro %}
